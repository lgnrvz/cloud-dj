{% extends "base.html" %}
{% block title %}Sign in &middot; Cloud DJ{% endblock %}
{% block content %}
<div class="auth-card card">
    <h1>Welcome</h1>
    <p>Sign in to request songs and control the queue</p>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>
    <div class="auth-link">No account? <a href="{{ url_for('signup') }}">Sign up here</a></div>
</div>
{% endblock %}
